<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster</title>
    <link rel="stylesheet" href="css/style-poster.css">
    <style>
        a {
    display: inline-block;
    padding: 20px 30px;
    background-color: aquamarine;
    text-align: center;
}
    </style> 
</head>
<body>
    <div class="wrap">
        <a class="back" href="index.html">Back</a>
        <h1>人とアート・Human and Art</h1>
        <div class="carousel">
            <img class="flower" src="img/Poster/Flower-1.png" alt="Flower1">
            <img class="face" src="img/Poster/Human-face.png" alt="Human-face">
            <img class="door" src="img/Poster/Door.png" alt="Door">
            <img class="balloon" src="img/Poster/Balloon.png" alt="Balloon">
            <img class="girl" src="img/Poster/Girl-painting.png" alt="Girl-painting">
    
            <!-- Repeat Repeat Repeat -->
            <img class="flower" src="img/Poster/Flower-1.png" alt="Flower1">
            <img class="face" src="img/Poster/Human-face.png" alt="Human-face">
            <img class="flower" src="img/Poster/Door.png" alt="Door">
            <img class="face" src="img/Poster/Balloon.png" alt="Balloon">
            <img class="face" src="img/Poster/Girl-painting.png" alt="Girl-painting">
        </div>
        <h1>花火・Fireworks</h1>
        <div class="carousel">
            <img class="firework1" src="img/Poster/Firework1.jpg" alt="firework1">
            <img class="firework1" src="img/Poster/Firework2.jpg" alt="firework2">
    
            <!-- Repeat Repeat Repeat -->
             <img class="firework1" src="img/Poster/Firework1.jpg" alt="firework1">
            <img class="firework1" src="img/Poster/Firework2.jpg" alt="firework2">
        </div>
    </div>
</body>
</html>
